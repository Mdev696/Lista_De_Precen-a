<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Geral - Presença TLP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --light: #ecf0f1;
            --rj-color: #2980b9;
            --es-color: #e67e22;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .uf-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .summary-card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            color: white;
        }

        .summary-rj {
            background: linear-gradient(135deg, #2980b9, #3498db);
        }

        .summary-es {
            background: linear-gradient(135deg, #e67e22, #f39c12);
        }

        .filter-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 10px;
            font-weight: 800;
            color: #6c757d;
            text-transform: uppercase;
        }

        select,
        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 13px;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 600px;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9fa;
            color: var(--primary);
            padding: 15px;
            text-align: left;
            position: sticky;
            top: 0;
            border-bottom: 2px solid #dee2e6;
            z-index: 10;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            background: #eee;
        }

        .btn-action {
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
        }

        .btn-edit {
            background: #fff3cd;
            color: #856404;
            border-color: #ffeeba;
        }

        .btn-delete {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .btn-back {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h2 style="margin:0; color: var(--primary);">📋 Painel de Controle de Presença</h2>
            <a href="index.html" class="btn-back">⬅ Voltar ao Lançamento</a>
        </header>

        <div class="uf-summary">
            <div class="summary-card summary-rj">
                <div style="font-size: 11px; font-weight: bold;">TÉCNICOS RJ</div>
                <div id="total-rj" style="font-size: 28px; font-weight: bold;">0</div>
            </div>
            <div class="summary-card summary-es">
                <div style="font-size: 11px; font-weight: bold;">TÉCNICOS ES</div>
                <div id="total-es" style="font-size: 28px; font-weight: bold;">0</div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>📅 Data</label>
                <input type="date" id="filtroData" onchange="carregarDados()">
            </div>
            <div class="filter-group">
                <label>📍 UF</label>
                <select id="filtroUF" onchange="atualizarFiltrosDependentes()">
                    <option value="">Todas</option>
                    <option value="RJ">RJ</option>
                    <option value="ES">ES</option>
                </select>
            </div>
            <div class="filter-group">
                <label>👤 Supervisor</label>
                <select id="filtroSuper" onchange="aplicarFiltrosLocais()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🏗️ Micro Área</label>
                <select id="filtroMicro" onchange="aplicarFiltrosLocais()">
                    <option value="">Todas</option>
                </select>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>UF</th>
                        <th>Técnico</th>
                        <th>Supervisor</th>
                        <th>Micro Área</th>
                        <th>Status</th>
                        <th style="text-align:center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sdcelpvagtanvheasvsd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkY2VscHZhZ3RhbnZoZWFzdnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzY5MzcsImV4cCI6MjA5MDExMjkzN30.FJ1joIyiyssd9IS6H9gFKRVRHJzSHnjCK7QRCODZWPQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- MAPAS DE DADOS (SUA ESTRUTURA) ---
        const listaStatusMap = {
            "1": "PRESENTE", "2": "PRESENTE - CONJUNTA (SWAP/N1)", "3": "PRESENTE - FORMATAÇÃO",
            "4": "PRESENTE - PREVENTIVA", "5": "INTERJORNADA(10h)", "6": "INTERMEDIÁRIO (13h)",
            "7": "INTERJORNADA(13h)", "8": "INTERJORNADA(16h)", "9": "INTERJORNADA (SEM RETORNO)",
            "10": "NOTURNO", "11": "FÉRIAS", "12": "INSS", "13": "ATESTADO", "14": "FOLGA"
        };

        const supervisoresPorUF = {
            "ES": ["BRUNO ALCANTARA", "ITALO COELHO", "LIVIO MOREIRA", "PABLO BATISTA", "RENAN ALVARINTO"],
            "RJ": ["ADRIANO TEIXEIRA PINHEIRO", "BRENO BEZERRA CORREA", "CARLOS HENRIQUE DE PAULA BATISTA", "CLOVIS BATISTA TORRES JUNIOR", "DIEGO CARDOSO", "HAROLDO SANT ANNA DA CUNHA", "LEANDRO MARTINS ABBUD", "LUCIANO INACIO DA SILVA", "RENATO COSTA MOREIRA", "RICARDO LUIZ SANTA ROSA", "RODRIGO CUNHA DE LIMA", "ROMULO E SILVA CABRAL", "WELLIGTON MORENO"]
        };

        const microsPorUF = {
            "ES": ["CACHOEIRO", "CARIACICA", "COLATINA", "GUARAPARI", "ICONHA", "LINHARES", "SERRA", "SÃO MATEUS", "VIANA", "VILA VELHA"],
            "RJ": ["AMARELA", "AZUL - BARRA/JPA", "AZUL - CENTRO", "AZUL - GRAN.TIJUCA", "AZUL - NORTE", "AZUL - OEST", "AZUL - SUL", "B2B", "NOTURNO", "VERDE", "VERMELHA - BAIXADA", "VERMELHA - CAXIAS", "VERMELHA - INTERIOR"]
        };

        let registrosDataAtual = [];

        window.onload = () => {
            document.getElementById('filtroData').value = new Date().toISOString().split('T')[0];
            carregarDados();
        };

        async function carregarDados() {
            const dataSel = document.getElementById('filtroData').value;
            const { data, error } = await _supabase.from('presencas').select('*').eq('data', dataSel).order('tecnico', { ascending: true });
            if (!error) {
                registrosDataAtual = data || [];
                aplicarFiltrosLocais();
            }
        }

        function atualizarFiltrosDependentes() {
            const uf = document.getElementById('filtroUF').value;
            const selectSuper = document.getElementById('filtroSuper');
            const selectMicro = document.getElementById('filtroMicro');

            selectSuper.innerHTML = '<option value="">Todos</option>';
            selectMicro.innerHTML = '<option value="">Todas</option>';

            if (uf && supervisoresPorUF[uf]) {
                supervisoresPorUF[uf].sort().forEach(s => selectSuper.add(new Option(s, s)));
                microsPorUF[uf].sort().forEach(m => selectMicro.add(new Option(m, m)));
            }
            aplicarFiltrosLocais();
        }

        function aplicarFiltrosLocais() {
            const fUF = document.getElementById('filtroUF').value;
            const fSuper = document.getElementById('filtroSuper').value;
            const fMicro = document.getElementById('filtroMicro').value;

            const filtrados = registrosDataAtual.filter(r => {
                const matchUF = fUF === "" || r.uf === fUF;
                const matchSuper = fSuper === "" || r.supervisor === fSuper;
                const matchMicro = fMicro === "" || r.cluster === fMicro;
                return matchUF && matchSuper && matchMicro;
            });

            document.getElementById('total-rj').innerText = filtrados.filter(r => r.uf === 'RJ').length;
            document.getElementById('total-es').innerText = filtrados.filter(r => r.uf === 'ES').length;

            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = filtrados.map(r => `
                <tr>
                    <td><b style="color: ${r.uf === 'RJ' ? 'var(--rj-color)' : 'var(--es-color)'}">${r.uf}</b></td>
                    <td><strong>${r.tecnico}</strong></td>
                    <td>${r.supervisor}</td>
                    <td>${r.cluster || '---'}</td>
                    <td><span class="status-badge">${r.status}</span></td>
                    <td style="text-align:center;">
                        <button class="btn-action btn-edit" onclick="menuEdicao('${r.id}', '${r.tecnico}', '${r.uf}')">✏️</button>
                        <button class="btn-action btn-delete" onclick="deletarRegistro('${r.id}', '${r.tecnico}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- NOVA LÓGICA DE EDIÇÃO MULTIPLA ---
        async function menuEdicao(id, nome, uf) {
            const menu = prompt(`EDITAR REGISTRO: ${nome}\n\nO que deseja alterar?\n1 - Status\n2 - Micro Área (Cluster)\n3 - Supervisor\n\nDigite o número:`);

            let colunaBD = "";
            let novoValor = "";

            if (menu === "1") { // Editar Status
                let msgStatus = `ESCOLHA O NOVO STATUS PARA ${nome}:\n\n`;
                for (let k in listaStatusMap) msgStatus += `${k} - ${listaStatusMap[k]}\n`;
                const cod = prompt(msgStatus);
                if (cod && listaStatusMap[cod]) {
                    colunaBD = "status";
                    novoValor = listaStatusMap[cod];
                }
            }
            else if (menu === "2") { // Editar Micro Área
                const listaMicro = microsPorUF[uf] || [];
                let msgMicro = `ESCOLHA A NOVA MICRO ÁREA (${uf}):\n\n`;
                listaMicro.forEach((m, i) => msgMicro += `${i + 1} - ${m}\n`);
                const cod = prompt(msgMicro);
                if (cod && listaMicro[parseInt(cod) - 1]) {
                    colunaBD = "cluster";
                    novoValor = listaMicro[parseInt(cod) - 1];
                }
            }
            else if (menu === "3") { // Editar Supervisor
                const listaSuper = supervisoresPorUF[uf] || [];
                let msgSuper = `ESCOLHA O NOVO SUPERVISOR (${uf}):\n\n`;
                listaSuper.forEach((s, i) => msgSuper += `${i + 1} - ${s}\n`);
                const cod = prompt(msgSuper);
                if (cod && listaSuper[parseInt(cod) - 1]) {
                    colunaBD = "supervisor";
                    novoValor = listaSuper[parseInt(cod) - 1];
                }
            }

            if (colunaBD && novoValor) {
                const { error } = await _supabase.from('presencas').update({ [colunaBD]: novoValor }).eq('id', id);
                if (!error) {
                    alert(`${colunaBD.toUpperCase()} atualizado com sucesso!`);
                    carregarDados();
                } else {
                    alert("Erro ao atualizar banco.");
                }
            }
        }

        async function deletarRegistro(id, nome) {
            if (confirm(`Excluir presença de ${nome}?`)) {
                const { error } = await _supabase.from('presencas').delete().eq('id', id);
                if (!error) carregarDados();
            }
        }
    </script>
</body>

</html>
